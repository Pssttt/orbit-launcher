name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.AURORA_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          AURORA_KEYSTORE: ${{ runner.temp }}/release.jks
          AURORA_KS_PASS: ${{ secrets.AURORA_KS_PASS }}
          AURORA_KEY_ALIAS: ${{ secrets.AURORA_KEY_ALIAS }}
          AURORA_KEY_PASS: ${{ secrets.AURORA_KEY_PASS }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/orbit-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/orbit-${{ github.ref_name }}.apk
          generate_release_notes: true
